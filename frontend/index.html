<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project OMEGA - Virtual Escape Room</title>
    <meta name="description" content="A cyberpunk-themed competitive escape room platform where teams race against time to stop a rogue AI" />
    <meta name="author" content="Project OMEGA Team" />

    <meta property="og:title" content="Project OMEGA - Virtual Escape Room" />
    <meta property="og:description" content="A cyberpunk-themed competitive escape room platform where teams race against time to stop a rogue AI" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Suppress MetaMask and other extension errors -->
    <script>
      // Suppress MetaMask extension errors (not related to our game)
      window.addEventListener('error', function(e) {
        if (e.message && (
          e.message.includes('MetaMask') || 
          e.message.includes('inpage.js') ||
          e.filename && e.filename.includes('inpage.js')
        )) {
          e.preventDefault();
          return true;
        }
      });
      
      // Suppress unhandled promise rejections from extensions
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (
          e.reason.message.includes('MetaMask') ||
          e.reason.message.includes('extension not found')
        )) {
          e.preventDefault();
          return true;
        }
      });
    </script>
  </body>
</html>
